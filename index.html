<!DOCTYPE html>
<html lang="vi">

<head>

<body>

    <div id="dice-screen" class="screen">

                <div class="face f4">4</div>
                <div class="face f5">5</div>
                <div class="face f6">6</div>
            </div>
            <div class="dice" id="dice2">
                <div class="face f1">1</div>
                <div class="face f2">2</div>
                <div class="face f3">3</div>
                <div class="face f4">4</div>
                <div class="face f5">5</div>
                <div class="face f6">6</div>
            </div>
        </div>
        <button id="roll-btn">Lắc ngay để nhận thư mời</button>
    </div>

    <div id="invitation-screen" class="screen hidden">
        <div class="glow-bg"></div>

        <nav class="navbar">
            <div class="logo">12A52326<span>®</span></div>
        </nav>

        <main class="hero">
            <h2 class="badge">Thiệp mời kỷ yếu</h2><br>
            <h2 class="badge3">Gửi đến</h2>
            <h3 class="main-heading">
                <br>...
            </h3>
            <h5 class="badge2">Thời điểm</h5>
            <h8 class="sub-text">26/04/2026</h8><br>
            <h5 class="badge2">Thời gian</h5>
            <h8 class="sub-text">10:00 - 11:45</h8><br>
            <h5 class="badge2">Địa điểm</h5>
            <h8 class="sub-text">Trường THPT Nguyễn Huệ</h8><br>
            <p class="sub-text">
                Xuân Khải mong đợi sự có mặt của diu để có 1 ngày kỷ yếu trọn vẹn và ý nghĩa
                <icon class="start">⭐</icon>
            </p>
        </main>
    </div>

    <script src="script2.js"></script>
</body>

</html>
